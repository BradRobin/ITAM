{% load static %}
<header class="topbar-employee">
    <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggleEmployee" aria-label="Toggle sidebar">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
    <div class="topbar-actions">
        <!-- Notifications Bell -->
        <div class="notification-container" id="notificationContainer">
            <button type="button" class="notification-bell" id="notificationBell" aria-label="Notifications">
                <i class="fas fa-bell"></i>
                <span class="notification-badge {% if unread_notifications == 0 %}hidden{% endif %}" id="notificationBadge">
                    {% if unread_notifications > 0 %}{{ unread_notifications }}{% endif %}
                </span>
            </button>
            <div class="employee-notification-dropdown" id="employeeNotificationDropdown">
                <div class="notification-dropdown-header">
                    <strong>Notifications</strong>
                    {% if unread_notifications > 0 %}
                        <button type="button" class="mark-all-link" onclick="markAllRead()">Mark all read</button>
                    {% endif %}
                </div>
                <div class="notification-dropdown-list">
                    {% for notification in recent_notifications %}
                        {% include 'inventory/includes/employee/notification_item.html' with notification=notification %}
                    {% empty %}
                        <div class="notification-empty">No notifications yet.</div>
                    {% endfor %}
                </div>
            </div>
        </div>

        <!-- Theme Toggle -->
        <button class="theme-toggle-btn" id="themeToggle" aria-label="Toggle theme">
            <i class="fas fa-moon theme-icon"></i>
        </button>

        <!-- Profile Dropdown -->
        <div class="profile-dropdown">
            <a class="profile-btn" id="profileToggle" href="{% url 'employee_settings' %}" aria-label="Open settings">
                <img class="profile-avatar" 
                     src="https://ui-avatars.com/api/?name={{ user.get_full_name|default:user.username|urlencode }}&background=random&color=fff&size=32&rounded=true&bold=true&font-size=0.33" 
                     alt="{{ user.username }}"
                     width="32"
                     height="32">
            </a>
        </div>
    </div>
</header>
