{% load static %}
<div class="employee-modal" id="confirmModal" aria-hidden="true">
    <div class="employee-modal-backdrop" data-close-modal></div>
    <div class="employee-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle">
        <div class="employee-modal-header">
            <h2 id="confirmModalTitle">Confirm Asset Receipt</h2>
            <button type="button" class="employee-modal-close" data-close-modal aria-label="Close">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="employee-modal-body">
            <p class="modal-message">
                Are you sure you want to confirm receipt of <strong>{{ asset.name }}</strong>?
            </p>
            <div class="modal-details">
                <div class="detail-row">
                    <span class="label">Serial</span>
                    <span class="value">{{ asset.serial_number }}</span>
                </div>
                <div class="detail-row">
                    <span class="label">Status</span>
                    <span class="value">
                        <span class="badge badge-{{ assignment.status_class|default:'pending' }}">
                            {{ assignment.status_display|default:'Pending' }}
                        </span>
                    </span>
                </div>
            </div>
            <div class="employee-modal-actions">
                <button type="button" class="btn btn-secondary" data-close-modal>
                    <i class="fas fa-times"></i> Cancel
                </button>
                <form method="post" action="{% url 'employee_confirm_asset' assignment.id %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-check"></i> Confirm
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
