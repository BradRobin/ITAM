{% load static %}
<div class="notification-item {% if not notification.is_read %}unread{% endif %}" 
     data-notification-id="{{ notification.id }}">
    <div class="notification-icon {{ notification.type|default:'info' }}">
        <i class="fas {% if notification.type == 'success' %}fa-check-circle{% elif notification.type == 'warning' %}fa-exclamation-triangle{% elif notification.type == 'danger' %}fa-times-circle{% else %}fa-info-circle{% endif %}"></i>
    </div>
    <div class="notification-content" onclick="handleNotificationClick('{{ notification.id }}', '{{ notification.link|default:'' }}')">
        <div class="notification-title">{{ notification.title }}</div>
        <div class="notification-message">{{ notification.message }}</div>
        <div class="notification-time">
            {% if notification.created_at %}
                {{ notification.created_at|timesince }} ago
            {% else %}
                Just now
            {% endif %}
        </div>
    </div>
    <div class="notification-actions">
        {% if not notification.is_read %}
        <button class="btn btn-sm btn-primary mark-read-btn" 
                onclick="event.stopPropagation(); markAsRead('{{ notification.id }}')" 
                title="Mark as read">
            <i class="fas fa-check"></i>
        </button>
        {% endif %}
    </div>
</div>
