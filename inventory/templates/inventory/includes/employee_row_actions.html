<td class="actions-cell" data-row-action="true">
    <div class="table-row-menu" data-menu-type="employee"
         data-employee-id="{{ employee_id }}"
         data-employee-name="{{ employee_name }}"
         data-edit-url="{% url 'employee_edit' employee_id %}"
         data-delete-url="{% url 'employee_delete' employee_id %}">
        <button type="button"
                class="table-row-menu-trigger"
                data-row-action="true"
                aria-label="Actions for {{ employee_name }}"
                aria-haspopup="true"
                aria-expanded="false">
            <i class="fas fa-ellipsis-v" aria-hidden="true"></i>
        </button>
        <div class="table-row-menu-dropdown" role="menu" hidden>
            <button type="button" class="table-row-menu-item" data-action="edit" role="menuitem">
                <i class="fas fa-pen" aria-hidden="true"></i>
                <span>Edit</span>
            </button>
            <button type="button" class="table-row-menu-item table-row-menu-item-danger" data-action="delete" role="menuitem">
                <i class="fas fa-trash-alt" aria-hidden="true"></i>
                <span>Delete</span>
            </button>
        </div>
    </div>
</td>
