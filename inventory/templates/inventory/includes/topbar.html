{% load static %}
<header class="topbar">
    <div class="topbar-left">
        <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
            <span class="sidebar-toggle-bars" aria-hidden="true">
                <span class="sidebar-toggle-line"></span>
                <span class="sidebar-toggle-line"></span>
                <span class="sidebar-toggle-line"></span>
            </span>
        </button>
    </div>
    <div class="topbar-actions">
        {% if user.is_authenticated %}
            {% include 'inventory/includes/notifications.html' %}
        {% endif %}
        <button class="theme-toggle-btn" id="themeToggle" aria-label="Toggle theme">
            <i class="fas fa-moon theme-icon"></i>
        </button>
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}" class="profile-badge" aria-label="View profile">
                <img class="profile-avatar" 
                     src="https://ui-avatars.com/api/?name={{ user.first_name|default:user.username|urlencode }}&background=random&color=fff&size=32&rounded=true&bold=true&font-size=0.33" 
                     alt="{{ user.username }}"
                     width="32"
                     height="32">
                <span class="profile-name">{{ user.username }}</span>
            </a>
        {% endif %}
    </div>
</header>
