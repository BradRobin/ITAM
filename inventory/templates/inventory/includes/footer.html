{% load static %}
<footer class="site-footer" role="contentinfo">
    <div class="site-footer-bar">
        <div class="site-footer-left">
            <span class="site-footer-brand">
                <i class="fas fa-cubes" aria-hidden="true"></i>
                <span>{{ itam_product_name }}</span>
            </span>
            {% if user.is_authenticated %}
                <nav class="site-footer-nav" aria-label="Footer navigation">
                    {% if user.employee and not user.is_staff and not user.is_superuser %}
                        <a href="{% url 'employee_dashboard' %}">Dashboard</a>
                        <a href="{% url 'employee_assets' %}">My Assets</a>
                        <a href="{% url 'employee_settings' %}">Settings</a>
                    {% else %}
                        <a href="{% url 'dashboard' %}">Dashboard</a>
                        <a href="{% url 'asset_list' %}">Assets</a>
                        <a href="{% url 'employee_list' %}">Employees</a>
                        <a href="{% url 'reports' %}">Reports</a>
                    {% endif %}
                </nav>
            {% endif %}
        </div>
        <p class="site-footer-copy">
            &copy; {% now "Y" %} {{ itam_product_name }}
        </p>
    </div>
</footer>
