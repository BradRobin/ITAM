{% load static %}
<div class="profile-dropdown">
    <button class="profile-btn" id="profileToggle" aria-label="Profile menu">
        <img class="profile-avatar" 
             src="{{ user_avatar_url_small }}"
             alt="{{ user.username }}"
             width="32"
             height="32">
        <span class="profile-name">{{ user.username }}</span>
        <i class="fas fa-chevron-down dropdown-arrow"></i>
    </button>
    <div class="dropdown-menu" id="profileDropdown">
        <div class="dropdown-header">
            <div class="dropdown-user-info">
                <img class="dropdown-avatar" 
                     src="{{ user_avatar_url_medium }}"
                     alt="{{ user.username }}"
                     width="64"
                     height="64">
                <div class="dropdown-user-details">
                    <span class="dropdown-user">{{ user.get_full_name|default:user.username }}</span>
                    <span class="dropdown-email">{{ user.email|default:"No email" }}</span>
                    <span class="dropdown-role">{% if user.is_staff %}Administrator{% else %}Team Member{% endif %}</span>
                </div>
            </div>
        </div>
        <div class="dropdown-divider"></div>
        <a class="dropdown-item" href="{% url 'profile' %}">
            <i class="fas fa-user-circle dropdown-icon"></i>
            <span>My Profile</span>
        </a>
        <a class="dropdown-item" href="{% url 'settings' %}">
            <i class="fas fa-sliders-h dropdown-icon"></i>
            <span>Preferences</span>
        </a>
        <div class="dropdown-divider"></div>
        <form method="post" action="{% url 'logout' %}" class="logout-form">
            {% csrf_token %}
            <button type="submit" class="dropdown-item dropdown-logout">
                <i class="fas fa-sign-out-alt dropdown-icon"></i>
                <span>Logout</span>
            </button>
        </form>
    </div>
</div>
