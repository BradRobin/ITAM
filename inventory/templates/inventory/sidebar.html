{% load static %}
<aside class="sidebar" id="sidebar" role="navigation">
    <div class="sidebar-brand">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="brand-svg">
            <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <span class="brand-text">{{ itam_product_name }}</span>
    </div>
    
    <!-- Main Navigation -->
    <ul class="sidebar-nav">
        <li class="sidebar-item">
            <a class="sidebar-link {% if request.path == '/' %}active{% endif %}" 
               href="{% url 'dashboard' %}" 
               data-loader="true"
               data-loader-message="Loading Dashboard...">
                <i class="fas fa-th-large sidebar-icon"></i>
                <span class="sidebar-label">Dashboard</span>
            </a>
        </li>
        <li class="sidebar-item">
            <a class="sidebar-link {% if 'assets' in request.path %}active{% endif %}" 
               href="{% url 'asset_list' %}" 
               data-loader="true"
               data-loader-message="Loading Assets...">
                <i class="fas fa-laptop sidebar-icon"></i>
                <span class="sidebar-label">Assets</span>
            </a>
        </li>
        <li class="sidebar-item">
            <a class="sidebar-link {% if 'employees' in request.path %}active{% endif %}" 
               href="{% url 'employee_list' %}" 
               data-loader="true"
               data-loader-message="Loading Employees...">
                <i class="fas fa-users sidebar-icon"></i>
                <span class="sidebar-label">Employees</span>
            </a>
        </li>
        <li class="sidebar-item">
            <a class="sidebar-link {% if 'reports' in request.path %}active{% endif %}" 
               href="{% url 'reports' %}" 
               data-loader="true"
               data-loader-message="Loading Reports...">
                <i class="fas fa-chart-bar sidebar-icon"></i>
                <span class="sidebar-label">Reports</span>
            </a>
        </li>
        <li class="sidebar-item">
            <a class="sidebar-link {% if 'profile' in request.path %}active{% endif %}" 
               href="{% url 'profile' %}" 
               data-loader="true"
               data-loader-message="Loading Profile...">
                <i class="fas fa-user-circle sidebar-icon"></i>
                <span class="sidebar-label">My Profile</span>
            </a>
        </li>
    </ul>
    
    <!-- Bottom Navigation -->
    <div class="sidebar-bottom">
        <ul class="sidebar-nav-bottom" aria-label="Account">
            <li class="sidebar-item">
                <a class="sidebar-link {% if 'settings' in request.path %}active{% endif %}" 
                   href="{% url 'settings' %}" 
                   data-loader="true"
                   data-loader-message="Loading Settings...">
                    <i class="fas fa-cog sidebar-icon" aria-hidden="true"></i>
                    <span class="sidebar-label">Settings</span>
                </a>
            </li>
            <li class="sidebar-item">
                {% include "inventory/includes/logout_form.html" %}
            </li>
        </ul>
        <div class="sidebar-version" title="{{ itam_product_name }} {{ itam_version }}">
            <span class="sidebar-version-product">ITAM</span>
            <span class="sidebar-version-number">{{ itam_version }}</span>
        </div>
    </div>
</aside>
